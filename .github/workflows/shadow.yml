name: shadow
# Forward SHADOW ledger + mark-to-market P&L: for each top-N pick, re-fetch its fills since it made
# the board (runner IP, off the home budget) and (1) replay the pipeline's copy-sim on closed round
# trips -> shadow/ledger.jsonl, and (2) mark realized+open P&L to current price -> shadow/pnl_ticks.jsonl
# (one equity sample per 6h tick -> per-lead forward curve + drawdown in shadow/pnl_summary.jsonl).
# pf2 is PARKED: PAPER forward record, no execution. Idempotent — re-derives the window + dedups each run.
on:
  workflow_dispatch:
  schedule:
    - cron: "20 */6 * * *"     # 4x/day forward tick; each run re-derives the full forward window

permissions:
  contents: write

concurrency:
  group: shadow
  cancel-in-progress: false

jobs:
  shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: check out private vet engine (read-only deploy key)
        uses: actions/checkout@v4
        with:
          repository: Baf-io/copyscan-vet
          ref: master
          path: vet
          ssh-key: ${{ secrets.VET_DEPLOY_KEY }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: deps
        run: pip install requests

      - name: forward shadow tick — closed-trip copy-sim (runner IP, off home budget)
        run: python3 vet/gh_shadow.py

      - name: forward P&L tick — mark-to-market realized+open (runner IP, off home budget)
        run: python3 vet/gh_shadow_pnl.py

      - name: portfolio allocator — blend leads into ONE copy-portfolio curve (Kelly x corr, no HL calls)
        run: python3 vet/gh_allocator.py

      - name: commit ledger + summary + pnl + portfolio
        run: |
          git config user.name "gh-shadow"
          git config user.email "gh-shadow@users.noreply.github.com"
          mkdir -p /tmp/so
          cp -f shadow/ledger.jsonl shadow/summary.jsonl shadow/pnl_ticks.jsonl shadow/pnl_summary.jsonl shadow/portfolio_curve.jsonl shadow/portfolio.json /tmp/so/ 2>/dev/null || true
          for i in 1 2 3 4 5; do
            git fetch -q origin main || true
            git reset -q --hard origin/main || true
            mkdir -p shadow
            cp -f /tmp/so/ledger.jsonl /tmp/so/summary.jsonl /tmp/so/pnl_ticks.jsonl /tmp/so/pnl_summary.jsonl /tmp/so/portfolio_curve.jsonl /tmp/so/portfolio.json shadow/ 2>/dev/null || true
            git add -A shadow
            git commit -q -m "shadow: forward tick $(date -u +%FT%TZ) [skip ci]" || { echo "no changes"; break; }
            if git push -q origin HEAD:main; then echo "pushed on try $i"; break; fi
            echo "push raced, retry $i"; sleep 3
          done
